services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mailnet

  dovecot:
    build:
      context: ./docker/dovecot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME}
    volumes:
      - vmail_data:/var/vmail
      - ./certs:/etc/ssl/mail:ro
    ports:
      - "143:143"
      - "993:993"
    networks:
      - mailnet

  postfix:
    build:
      context: ./docker/postfix
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dovecot:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME}
    volumes:
      - ./certs:/etc/ssl/mail:ro
    ports:
      - "25:25"
    networks:
      - mailnet

  admin-api:
    build:
      context: ./docker/admin-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ROOT_DOMAIN: ${ROOT_DOMAIN}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      CF_API_TOKEN: ${CF_API_TOKEN}
      CF_ZONE_ID: ${CF_ZONE_ID}
      ROOT_DOMAINS: ${ROOT_DOMAINS:-}
      VMAIL_ROOT: /var/vmail
    # NOTE: admin-api needs write access to vmail in order to hard-delete
    # mailbox/domain directories. It does NOT need to read as vmail uid
    # because the container runs as root by default.
    volumes:
      - vmail_data:/var/vmail
    # No host port exposure: admin-api is reached only through mail-web's
    # nginx reverse proxy at http://<host>:8081/api/* — reduces attack surface.
    expose:
      - "8080"
    networks:
      - mailnet

  mail-web:
    build:
      context: ./docker/mail-web
    restart: unless-stopped
    depends_on:
      - admin-api
    ports:
      - "8081:80"
    networks:
      - mailnet

volumes:
  postgres_data:
  vmail_data:

networks:
  mailnet:
    driver: bridge
